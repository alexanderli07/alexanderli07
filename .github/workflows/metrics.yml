name: Generate Metrics

# Builds metrics.svg (3D calendar, languages, habits, achievements) and commits it to main.
# Requires a METRICS_TOKEN secret (a Personal Access Token) — see the setup notes.
on:
  schedule:
    - cron: "0 0 * * *"     # daily at midnight UTC
  workflow_dispatch:         # lets you run it manually from the Actions tab

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SpiritByte
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Toronto

          # 3D isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Most-used languages
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8

          # When you code (coding habits)
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Highlights / achievements
          plugin_achievements: yes
          plugin_achievements_threshold: B

          # Commit the rendered SVG back to the repo
          output_action: commit
          committer_branch: main